name: Generate ASCII Artwork

on: push

jobs:
  first_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7

      - name: List Repo Files
        run: ls -ltra

      - name: Execute Shell script
        run: |
          chmod +x ascii-script.sh
          ./ascii-script.sh